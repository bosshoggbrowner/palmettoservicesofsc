<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Palmetto Services LLC of SC - Contact</title>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background-color: #000000;
  color: white;
  margin: 0;
}

.center { text-align: center; }

a { color: #4EA5D9; }

/* HEADER */
.header {
  overflow: hidden;
  background-color: #000000;
  padding: 20px 10px;
  position: relative;
  z-index: 10000;
}

.header a {
  margin: 0;
  float: left;
  color: white;
  text-align: center;
  padding: 12px;
  text-decoration: none;
  font-size: 18px;
  line-height: 25px;
  border-radius: 4px;
}

.header a.logo {
  font-size: 25px;
  font-weight: bold;
}

.header a:hover {
  background-color: #4C4C4C;
  color: white;
}

.header a.active {
  background-color: #000080;
  color: white;
}

.header-right {
  float: right;
}

/* HAMBURGER ICON */
#menuIcon {
  display: none;
  font-size: 30px;
  cursor: pointer;
  color: white;
  float: right;
  padding: 10px;
}

/* MOBILE MENU */
@media screen and (max-width: 600px) {
  .header-right {
    display: none;
    width: 100%;
    background-color: #000000;
    text-align: left;
    padding-top: 10px;
    float: none;
  }

  .header a {
    float: none;
    display: block;
    padding: 14px;
    border-bottom: 1px solid #333;
  }

  #menuIcon {
    display: block;
  }
}
</style>

</head>

<body>

<!-- UPDATED HEADER WITH MATCHING MENU -->
<div class="header">

  <a href="index.html">
    <img src="Images/PSLogo.jpg" align="left" style="width:60px;height:60px;">
  </a>

  <a href="services.html" class="logo">Palmetto Services LLC of SC</a>

  <!-- HAMBURGER ICON -->
  <span id="menuIcon" onclick="toggleMenu()">☰</span>

  <!-- NAV LINKS -->
  <div class="header-right" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="about.html">About</a>
    <a class="active" href="contact.html">Contact</a>
  </div>

</div>

<!-- PAGE CONTENT -->

  <div style="text-align:center; margin-top:40px;">
  <a href="https://www.facebook.com/share/1CQmiShwnb/" target="_blank">
    <img src="Images/fblogo.png" 
         alt="Facebook Logo"
         style="width:80px; max-width:25%; height:auto; display:inline-block;">
  </a>
</div>
  
<h2 style="text-align:center;">Please contact us with any questions.</h2>
<h2 style="text-align:center;">Call by phone at 803-467-8308</h2>

<div class="center">
  <p>If you would like more information, let us know what you have in mind.</p>
</div>

<div style="text-align:center;">

  <form method="POST" data-netlify="true"
        style="
          max-width:600px;
          width:90%;
          margin:0 auto;
          padding:20px;
          box-sizing:border-box;
        ">

    <div class="fields">

      <div class="field half">
        <input type="text" name="name" id="name" placeholder="Name"
               style="
                 width:100%;
                 padding:12px;
                 margin:8px 0;
                 border-radius:6px;
                 border:none;
                 font-size:16px;
                 box-sizing:border-box;
               ">
      </div>

      <div class="field half">
        <input type="email" name="email" id="email" placeholder="Email"
               style="
                 width:100%;
                 padding:12px;
                 margin:8px 0;
                 border-radius:6px;
                 border:none;
                 font-size:16px;
                 box-sizing:border-box;
               ">
      </div>

      <div class="field">
        <textarea name="message" id="message" placeholder="Message" rows="7"
                  style="
                    width:100%;
                    padding:12px;
                    margin:8px 0;
                    border-radius:6px;
                    border:none;
                    font-size:16px;
                    box-sizing:border-box;
                  "></textarea>
      </div>

      <div class="field">
        <input type="file" name="myfile" id="myfile"
               style="
                 width:100%;
                 padding:12px;
                 margin:8px 0;
                 border-radius:6px;
                 border:none;
                 font-size:16px;
                 box-sizing:border-box;
               ">
      </div>

      <input type="submit" value="Submit"
             style="
               width:100%;
               padding:14px;
               margin-top:10px;
               background-color:#000080;
               color:white;
               border:none;
               border-radius:6px;
               font-size:18px;
               cursor:pointer;
               box-sizing:border-box;
             ">

    </div>
  </form>
</div>

<br>

<!-- FOOTER TEXT -->
<div class="center">
  <p>
    <br>Check out the <a href="portfolio.html">Portfolio Page</a> to see our work.
  </p>
</div>
  
<!-- MOBILE MENU SCRIPT -->
<script>
function toggleMenu() {
  var menu = document.getElementById("mobileMenu");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
