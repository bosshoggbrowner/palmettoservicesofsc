<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Palmetto Services LLC of SC - Portfolio</title>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background-color: #000000;
  color: white;
  margin: 0;
}

.center { text-align: center; }

a { color: #4EA5D9; }

/* HEADER */
.header {
  overflow: hidden;
  background-color: #000000;
  padding: 20px 10px;
  position: relative;
  z-index: 10000;
}

.header a {
  margin: 0;
  float: left;
  color: white;
  text-align: center;
  padding: 12px;
  text-decoration: none;
  font-size: 18px;
  line-height: 25px;
  border-radius: 4px;
}

.header a.logo {
  font-size: 25px;
  font-weight: bold;
}

.header a:hover {
  background-color: #4C4C4C;
  color: white;
}

.header a.active {
  background-color: #000080;
  color: white;
}

.header-right {
  float: right;
}

/* HAMBURGER ICON */
#menuIcon {
  display: none;
  font-size: 30px;
  cursor: pointer;
  color: white;
  float: right;
  padding: 10px;
}

/* MOBILE MENU */
@media screen and (max-width: 600px) {
  .header-right {
    display: none;
    width: 100%;
    background-color: #000000;
    text-align: left;
    padding-top: 10px;
    float: none;
  }

  .header a {
    float: none;
    display: block;
    padding: 14px;
    border-bottom: 1px solid #333;
  }

  #menuIcon {
    display: block;
  }
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

  <a href="index.html">
    <img src="Images/PSLogo.jpg" align="left" style="width:60px;height:60px;">
  </a>

  <a href="services.html" class="logo">Palmetto Services LLC of SC</a>

  <span id="menuIcon" onclick="toggleMenu()">☰</span>

  <div class="header-right" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a class="active" href="portfolio.html">Portfolio</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

</div>

<!-- PAGE CONTENT -->
<div style="width:100%;padding:20px 5%;box-sizing:border-box;">

  <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;">

    <!-- Image 1 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature1.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Image 2 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature2.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Image 3 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature3.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Image 4 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature4.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Image 5 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature5.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Image 6 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature6.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

  </div>

</div>

<!-- POPUP OVERLAY -->
<div id="imgPopup"
     style="
       display:none;
       position:fixed;
       top:0;
       left:0;
       width:100%;
       height:100%;
       background:rgba(0,0,0,0.95);
       z-index:999999;
     ">

  <!-- IMAGE WRAPPER -->
  <div style="
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        max-width:100%;
        max-height:100%;
      ">

    <!-- CLOSE BUTTON ON IMAGE -->
    <span onclick="closePopup()"
          style="
            position:absolute;
            top:-10px;
            right:-10px;
            background:rgba(0,0,0,0.7);
            width:40px;
            height:40px;
            border-radius:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:26px;
            color:white;
            cursor:pointer;
            z-index:1000000;
          ">
      ✕
    </span>

    <!-- FULL‑SIZE IMAGE -->
    <img id="popupImg"
         style="
           max-width:100vw;
           max-height:100vh;
           width:auto;
           height:auto;
           object-fit:contain;
           border-radius:8px;
         ">
  </div>

</div>

<!-- FOOTER -->
<div class="center">
  <p>
    <br>
    If you would like more information, visit our <a href="contact.html">Contact Page</a>.
  </p>
  <br>
</div>

<!-- SCRIPTS -->
<script>
function toggleMenu() {
  var menu = document.getElementById("mobileMenu");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function openPopup(src) {
  document.getElementById("popupImg").src = src;
  document.getElementById("imgPopup").style.display = "block";
}

function closePopup() {
  document.getElementById("imgPopup").style.display = "none";
}
</script>

</body>
</html>
