<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Collage Test</title>
</head>
<body style="margin:0;padding:0;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;">

<!-- PHOTO COLLAGE SECTION -->
<div style="width:100%;padding:20px 5%;box-sizing:border-box;">

  <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;">

    <!-- Image 1 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature1.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Image 2 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature2.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Image 3 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature3.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Image 4 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature4.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Image 5 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature5.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Image 6 -->
    <div style="flex:1 1 calc(33.33% - 20px);max-width:33.33%;">
      <img src="Images/Feature6.jpg"
           onclick="openPopup(this.src)"
           style="width:100%;height:auto;border-radius:8px;cursor:pointer;">
    </div>

  </div>

</div>

<!-- POPUP OVERLAY -->
<div id="imgPopup"
     style="
       display:none;
       position:fixed;
       top:0;
       left:0;
       width:100%;
       height:100%;
       background:rgba(0,0,0,0.95);
       z-index:9999;
     ">

  <!-- CLOSE BUTTON -->
  <div onclick="closePopup()"
       style="
         position:fixed;
         top:10px;
         right:15px;
         width:40px;
         height:40px;
         background:rgba(0,0,0,0.7);
         border-radius:20px;
         display:flex;
         align-items:center;
         justify-content:center;
         cursor:pointer;
         z-index:10000;
       ">
    <span style="color:#fff;font-size:26px;font-weight:bold;line-height:1;">✕</span>
  </div>

  <!-- FULL-SIZE IMAGE -->
  <img id="popupImg"
       style="
         position:absolute;
         top:50%;
         left:50%;
         transform:translate(-50%, -50%);
         max-width:100%;
         max-height:100%;
         width:auto;
         height:auto;
         object-fit:contain;
         border-radius:8px;
       ">
</div>

<script>
function openPopup(src) {
  document.getElementById("popupImg").src = src;
  document.getElementById("imgPopup").style.display = "block";
}

function closePopup() {
  document.getElementById("imgPopup").style.display = "none";
}
</script>

</body>
</html>
